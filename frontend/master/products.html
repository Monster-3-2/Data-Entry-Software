<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Master — MAHLE</title>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    .app-layout { display: flex; min-height: 100vh; }
    .main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
    thead th { font-size: 0.72rem; padding: 9px 10px; }
    tbody td { padding: 8px 10px; font-size: 0.83rem; }
    .num-cell { font-family: var(--font-mono); font-size: 0.82rem; }
    td.editable input, td.editable select { width: 100%; min-width: 60px; padding: 3px 6px; font-size: 0.82rem; }
    .row-actions { display: flex; gap: 4px; white-space: nowrap; }
    .save-row-btn { display: none; }
    tr.dirty .save-row-btn { display: inline-flex; }
    tr.dirty { background: rgba(232,119,34,0.04) !important; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Product Master</div>
      <div class="topbar-actions">
        <button class="btn btn-orange btn-sm" onclick="openAddModal()">+ Add Product</button>
      </div>
    </div>

    <div class="page-content">
      <div class="filter-bar">
        <select class="form-control" id="filterLine" style="width:150px" onchange="onFilterLineChange()">
          <option value="">All Lines</option>
        </select>
        <select class="form-control" id="filterModel" style="width:150px" onchange="loadProducts()">
          <option value="">All Models</option>
        </select>
        <input type="text" class="form-control" id="filterSearch" placeholder="Search ID or description..." style="width:220px" oninput="loadProducts()"/>
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Clear</button>
        <span style="margin-left:auto;font-size:0.82rem;color:var(--text-muted)" id="rowCount"></span>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Product ID</th>
                <th>Description</th>
                <th>Line</th>
                <th>Model</th>
                <th>Type</th>
                <th>Hourly Rate</th>
                <th>EQ Factor</th>
                <th>No. Persons</th>
                <th>Pitch Time</th>
                <th>TE Time</th>
                <th>Man Time</th>
                <th>Machine Time</th>
                <th>Handling Unit</th>
                <th>Cycle Time</th>
                <th>Cost</th>
                <th>Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productBody">
              <tr><td colspan="18"><div class="loading-state"><span class="spinner"></span></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <div class="modal-title">Add New Product</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row form-row-2">
        <div class="form-group"><label class="form-label">Line *</label>
          <select class="form-control" id="addLine" onchange="loadAddModels()"><option value="">—</option></select></div>
        <div class="form-group"><label class="form-label">Model *</label>
          <select class="form-control" id="addModel" disabled><option value="">—</option></select></div>
        <div class="form-group"><label class="form-label">Product ID *</label>
          <input class="form-control" id="addProductId" placeholder="e.g. SS610001"/></div>
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-control" id="addType"><option value="">—</option><option value="type1">Type 1</option><option value="type2">Type 2</option><option value="type3">Type 3</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label>
        <input class="form-control" id="addDesc" placeholder="Product description"/></div>
      <div class="form-row form-row-4">
        <div class="form-group"><label class="form-label">Hourly Rate</label><input class="form-control" type="number" id="addHourlyRate" value="32"/></div>
        <div class="form-group"><label class="form-label">EQ Factor</label><input class="form-control" type="number" id="addEqFactor" value="1.25" step="0.01"/></div>
        <div class="form-group"><label class="form-label">No. Persons</label><input class="form-control" type="number" id="addPersons" value="10"/></div>
        <div class="form-group"><label class="form-label">Pitch Time</label><input class="form-control" type="number" id="addPitchTime" value="1.84" step="0.01"/></div>
        <div class="form-group"><label class="form-label">TE Time</label><input class="form-control" type="number" id="addTeTime" value="18.42" step="0.01"/></div>
        <div class="form-group"><label class="form-label">Man Time</label><input class="form-control" type="number" id="addManTime" value="18.42" step="0.01"/></div>
        <div class="form-group"><label class="form-label">Machine Time</label><input class="form-control" type="number" id="addMachineTime" value="0" step="0.01"/></div>
        <div class="form-group"><label class="form-label">Handling Unit</label><input class="form-control" type="number" id="addHandling" value="12"/></div>
        <div class="form-group"><label class="form-label">Cycle Time</label><input class="form-control" type="number" id="addCycleTime" value="0" step="0.01"/></div>
        <div class="form-group"><label class="form-label">Cost</label><input class="form-control" type="number" id="addCost" value="0"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-orange" onclick="saveNewProduct()">Add Product</button>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/layout.js"></script>
<script>
  Auth.requireAuth(['admin']);
  buildLayout('products');

  let allLines = [], allModels = [], allProducts = [];

  async function init() {
    [allLines, allModels] = await Promise.all([
      API.get('/api/master/lines'),
      API.get('/api/master/models'),
    ]);
    allLines.forEach(l => {
      document.getElementById('filterLine').add(new Option(l.name, l.id));
      document.getElementById('addLine').add(new Option(l.name, l.id));
    });
    loadProducts();
  }

  async function onFilterLineChange() {
    const lineId = document.getElementById('filterLine').value;
    const modelSel = document.getElementById('filterModel');
    modelSel.innerHTML = '<option value="">All Models</option>';
    allModels.filter(m => !lineId || m.line_id === lineId)
      .forEach(m => modelSel.add(new Option(m.name, m.id)));
    loadProducts();
  }

  async function loadProducts() {
    const lineId  = document.getElementById('filterLine').value;
    const modelId = document.getElementById('filterModel').value;
    const search  = document.getElementById('filterSearch').value.toLowerCase();

    let q = '?';
    if (lineId) q += `line_id=${lineId}&`;
    if (modelId) q += `model_id=${modelId}&`;

    document.getElementById('productBody').innerHTML = '<tr><td colspan="18"><div class="loading-state"><span class="spinner"></span></div></td></tr>';

    allProducts = await API.get('/api/master/products' + q);

    let filtered = allProducts;
    if (search) filtered = filtered.filter(p =>
      (p.product_id || '').toLowerCase().includes(search) ||
      (p.description || '').toLowerCase().includes(search)
    );

    document.getElementById('rowCount').textContent = `${filtered.length} products`;
    renderTable(filtered);
  }

  function modelName(modelId) {
    const m = allModels.find(x => x.id === modelId);
    return m ? m.name : '—';
  }

  function lineName(modelId) {
    const m = allModels.find(x => x.id === modelId);
    if (!m) return '—';
    const l = allLines.find(x => x.id === m.line_id);
    return l ? l.name : '—';
  }

  function editableNum(val, field, id) {
    return `<td class="editable num-cell" onclick="makeEditable(this,'${field}','${id}','number')">${fmtNum(val)}</td>`;
  }

  function editableText(val, field, id) {
    return `<td class="editable" onclick="makeEditable(this,'${field}','${id}','text')">${val || ''}</td>`;
  }

  function renderTable(data) {
    if (!data.length) {
      document.getElementById('productBody').innerHTML = '<tr><td colspan="18"><div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">No products found</div></div></td></tr>';
      return;
    }
    document.getElementById('productBody').innerHTML = data.map((p, i) => `
      <tr id="row-${p.id}">
        <td>${i+1}</td>
        ${editableText(p.product_id, 'product_id', p.id)}
        ${editableText(p.description, 'description', p.id)}
        <td>${lineName(p.model_id)}</td>
        <td>${modelName(p.model_id)}</td>
        <td class="editable" onclick="makeSelectEditable(this,'product_type','${p.id}',['','type1','type2','type3'],'${p.product_type||''}')">${p.product_type || '—'}</td>
        ${editableNum(p.hourly_rate, 'hourly_rate', p.id)}
        ${editableNum(p.eq_factor, 'eq_factor', p.id)}
        <td class="editable num-cell" onclick="makeEditable(this,'no_of_persons','${p.id}','number')">${p.no_of_persons}</td>
        ${editableNum(p.pitch_time, 'pitch_time', p.id)}
        ${editableNum(p.te_time, 'te_time', p.id)}
        ${editableNum(p.man_time, 'man_time', p.id)}
        ${editableNum(p.machine_time, 'machine_time', p.id)}
        <td class="editable num-cell" onclick="makeEditable(this,'handling_unit','${p.id}','number')">${p.handling_unit}</td>
        ${editableNum(p.cycle_time, 'cycle_time', p.id)}
        ${editableNum(p.cost, 'cost', p.id)}
        <td>
          <label style="cursor:pointer">
            <input type="checkbox" ${p.is_active?'checked':''} onchange="toggleActive('${p.id}',this.checked)"/>
          </label>
        </td>
        <td>
          <div class="row-actions">
            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Del</button>
            <button class="btn btn-primary btn-sm save-row-btn" onclick="saveRow('${p.id}')">Save</button>
          </div>
        </td>
      </tr>`).join('');
  }

  // Inline editing
  const dirtyRows = {}; // id -> field -> value

  function makeEditable(td, field, id, type) {
    if (td.querySelector('input')) return;
    const cur = td.textContent.trim();
    const input = document.createElement('input');
    input.type = type; input.value = cur;
    td.innerHTML = ''; td.appendChild(input);
    input.focus();
    input.addEventListener('blur', () => {
      const newVal = type === 'number' ? parseFloat(input.value) : input.value;
      td.textContent = type === 'number' ? fmtNum(newVal) : newVal;
      if (!dirtyRows[id]) dirtyRows[id] = {};
      dirtyRows[id][field] = newVal;
      document.getElementById('row-' + id)?.classList.add('dirty');
    });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  }

  function makeSelectEditable(td, field, id, options, cur) {
    if (td.querySelector('select')) return;
    const sel = document.createElement('select');
    options.forEach(o => sel.add(new Option(o || '—', o)));
    sel.value = cur;
    td.innerHTML = ''; td.appendChild(sel);
    sel.focus();
    sel.addEventListener('change', () => {
      if (!dirtyRows[id]) dirtyRows[id] = {};
      dirtyRows[id][field] = sel.value;
      document.getElementById('row-' + id)?.classList.add('dirty');
    });
    sel.addEventListener('blur', () => { td.textContent = sel.value || '—'; });
  }

  async function saveRow(id) {
    if (!dirtyRows[id]) return;
    try {
      await API.put(`/api/master/products/${id}`, dirtyRows[id]);
      delete dirtyRows[id];
      document.getElementById('row-' + id)?.classList.remove('dirty');
      showToast('Product updated', 'success');
    } catch (e) { showToast(e.message || 'Save failed', 'error'); }
  }

  async function toggleActive(id, val) {
    try {
      await API.put(`/api/master/products/${id}`, { is_active: val });
      showToast('Status updated', 'success');
    } catch (e) { showToast('Failed', 'error'); }
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this product permanently?')) return;
    try {
      await API.delete(`/api/master/products/${id}`);
      showToast('Product deleted', 'success');
      loadProducts();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // Add modal
  async function loadAddModels() {
    const lineId = document.getElementById('addLine').value;
    const sel = document.getElementById('addModel');
    sel.innerHTML = '<option value="">—</option>';
    sel.disabled = !lineId;
    allModels.filter(m => m.line_id === lineId).forEach(m => sel.add(new Option(m.name, m.id)));
    sel.disabled = false;
  }

  function openAddModal() { document.getElementById('addModal').classList.add('open'); }
  function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

  async function saveNewProduct() {
    const modelId = document.getElementById('addModel').value;
    const productId = document.getElementById('addProductId').value.trim();
    if (!modelId || !productId) { showToast('Line, Model, and Product ID are required', 'error'); return; }

    const body = {
      model_id: modelId,
      product_id: productId,
      description: document.getElementById('addDesc').value,
      product_type: document.getElementById('addType').value || null,
      hourly_rate: parseFloat(document.getElementById('addHourlyRate').value) || 0,
      eq_factor: parseFloat(document.getElementById('addEqFactor').value) || 1,
      no_of_persons: parseInt(document.getElementById('addPersons').value) || 1,
      pitch_time: parseFloat(document.getElementById('addPitchTime').value) || 0,
      te_time: parseFloat(document.getElementById('addTeTime').value) || 0,
      man_time: parseFloat(document.getElementById('addManTime').value) || 0,
      machine_time: parseFloat(document.getElementById('addMachineTime').value) || 0,
      handling_unit: parseInt(document.getElementById('addHandling').value) || 1,
      cycle_time: parseFloat(document.getElementById('addCycleTime').value) || 0,
      cost: parseFloat(document.getElementById('addCost').value) || 0,
    };

    try {
      await API.post('/api/master/products', body);
      showToast('Product added successfully', 'success');
      closeAddModal();
      loadProducts();
    } catch (e) { showToast(e.message || 'Failed to add product', 'error'); }
  }

  function resetFilters() {
    document.getElementById('filterLine').value = '';
    document.getElementById('filterModel').innerHTML = '<option value="">All Models</option>';
    document.getElementById('filterSearch').value = '';
    loadProducts();
  }

  init();
</script>
</body>
</html>
